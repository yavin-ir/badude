<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badude - Telegram Channel Reader</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0e1621; color: #f5f5f5; height: 100vh; overflow: hidden;
}
.app { display: flex; height: 100vh; }

.sidebar {
    width: 320px; background: #17212b; border-right: 1px solid #0e1621;
    display: flex; flex-direction: column; flex-shrink: 0;
}
.sidebar-header {
    padding: 12px 16px; display: flex; align-items: center;
    justify-content: space-between; border-bottom: 1px solid #0e1621;
}
.sidebar-header h2 { font-size: 16px; font-weight: 600; }
.btn-icon {
    background: none; border: none; color: #8b9bab; cursor: pointer;
    padding: 6px; border-radius: 4px; font-size: 18px; line-height: 1;
}
.btn-icon:hover { background: #232e3c; color: #f5f5f5; }
.channel-list { flex: 1; overflow-y: auto; }
.channel-item {
    padding: 12px 16px; cursor: pointer; display: flex;
    align-items: center; gap: 12px; transition: background 0.15s;
}
.channel-item:hover { background: #232e3c; }
.channel-item.active { background: #2b5278; }
.channel-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 600; flex-shrink: 0; color: #fff;
}
.channel-info { flex: 1; min-width: 0; }
.channel-name {
    font-size: 14px; font-weight: 500; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
}
.channel-display { font-size: 12px; color: #6ab3f3; margin-top: 1px; }
.channel-meta { font-size: 12px; color: #8b9bab; margin-top: 2px; }
.empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; color: #8b9bab;
    text-align: center; padding: 24px; font-size: 14px;
}

.main { flex: 1; display: flex; flex-direction: column; background: #0e1621; }
.main-header {
    padding: 12px 20px; background: #17212b; border-bottom: 1px solid #0e1621;
    display: none; align-items: center; gap: 12px;
}
.main-header .header-info { flex: 1; }
.main-header .channel-name { font-size: 16px; font-weight: 600; }
.main-header .channel-display { font-size: 12px; color: #8b9bab; }
.messages-area {
    flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column;
}
.msg-loading { text-align: center; padding: 12px; color: #8b9bab; font-size: 13px; }

.msg-bubble {
    background: #182533; border-radius: 0 12px 12px 0; padding: 8px 14px 6px;
    margin: 0 60px 2px 0; word-wrap: break-word;
    border-left: 3px solid #2b5278; position: relative;
}
.msg-bubble + .msg-bubble { margin-top: 0; }
.msg-bubble:last-child, .msg-bubble + .msg-loading { margin-bottom: 0; }
.msg-gap { height: 10px; }
.msg-author {
    font-size: 13px; font-weight: 600; color: #6ab3f3; margin-bottom: 4px;
}
.msg-text {
    font-size: 14px; line-height: 1.55; white-space: pre-wrap;
}
.msg-text a { color: #6ab3f3; text-decoration: none; }
.msg-text a:hover { text-decoration: underline; }
.msg-text b, .msg-text strong { font-weight: 600; }
.msg-text i, .msg-text em { font-style: italic; }
.msg-text code {
    background: #1a2836; padding: 1px 5px; border-radius: 4px;
    font-family: 'SF Mono', Consolas, monospace; font-size: 13px;
}
.msg-text pre {
    background: #1a2836; padding: 10px 12px; border-radius: 6px;
    margin: 6px 0; overflow-x: auto; font-family: 'SF Mono', Consolas, monospace; font-size: 13px;
}
.msg-text pre code { background: none; padding: 0; }
.msg-footer {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 10px; margin-top: 4px; padding-top: 2px;
}
.msg-views {
    font-size: 11px; color: #6b7b8b; display: flex; align-items: center; gap: 3px;
}
.msg-views svg { width: 14px; height: 14px; fill: #6b7b8b; }
.msg-date { font-size: 11px; color: #6b7b8b; }
.msg-divider {
    text-align: center; padding: 12px 20px; color: #6b7b8b; font-size: 12px;
    position: relative;
}
.msg-divider span {
    background: #0e1621; padding: 0 12px; position: relative; z-index: 1;
}
.msg-divider::before {
    content: ''; position: absolute; left: 40px; right: 40px; top: 50%;
    border-top: 1px solid #1e2d3d;
}

.status-bar {
    padding: 4px 16px; font-size: 12px; color: #8b9bab;
    background: #17212b; border-top: 1px solid #0e1621; text-align: center;
}
.status-bar.error { color: #e57373; }
.status-bar.ok { color: #81c784; }

.modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
    background: #17212b; border-radius: 12px; padding: 24px;
    width: 480px; max-width: 90vw; max-height: 90vh; overflow-y: auto;
}
.modal h3 { font-size: 18px; margin-bottom: 16px; }
.settings-section { margin-bottom: 20px; }
.settings-section-title {
    font-size: 13px; font-weight: 600; color: #6ab3f3; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid #232e3c;
}
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 13px; color: #8b9bab; margin-bottom: 4px; }
.form-group input {
    width: 100%; padding: 10px 12px; background: #0e1621; border: 1px solid #2b5278;
    border-radius: 8px; color: #f5f5f5; font-size: 14px; outline: none;
}
.form-group input:focus { border-color: #6ab3f3; }
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }
.form-row .form-group.narrow { flex: 0 0 110px; }
.form-hint { font-size: 11px; color: #6b7b8b; margin-top: 4px; }
.conn-status {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    background: #0e1621; border-radius: 8px; margin-bottom: 16px; font-size: 13px;
}
.conn-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.conn-dot.ok { background: #81c784; }
.conn-dot.err { background: #e57373; }
.conn-dot.off { background: #6b7b8b; }
.modal-actions { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-top: 20px; }
.modal-actions-right { display: flex; gap: 10px; }
.btn {
    padding: 8px 20px; border: none; border-radius: 8px;
    font-size: 14px; cursor: pointer; font-weight: 500;
}
.btn-primary { background: #2b5278; color: #f5f5f5; }
.btn-primary:hover { background: #3a6a99; }
.btn-secondary { background: #232e3c; color: #8b9bab; }
.btn-secondary:hover { background: #2d3a4a; color: #f5f5f5; }
.btn-test { background: #1a3a2a; color: #81c784; }
.btn-test:hover { background: #234a34; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2b5278; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a6a99; }
</style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Badude</h2>
            <div>
                <button class="btn-icon" id="btnRefresh" title="Refresh">&#x21bb;</button>
                <button class="btn-icon" id="btnSettings" title="Settings">&#x2699;</button>
            </div>
        </div>
        <div class="channel-list" id="channelList">
            <div class="empty-state">No channels loaded.<br>Configure settings and click refresh.</div>
        </div>
    </div>
    <div class="main">
        <div class="main-header" id="mainHeader">
            <div class="channel-avatar" id="headerAvatar"></div>
            <div class="header-info">
                <div class="channel-name" id="headerName"></div>
                <div class="channel-display" id="headerDisplay"></div>
            </div>
        </div>
        <div class="messages-area" id="msgArea">
            <div class="empty-state">Select a channel to view messages</div>
        </div>
        <div class="status-bar" id="statusBar">Not connected</div>
    </div>
</div>

<div class="modal-overlay" id="settingsModal">
    <div class="modal">
        <h3>Settings</h3>
        <div class="conn-status"><span class="conn-dot off" id="connDot"></span><span id="connText">Not configured</span></div>
        <div class="settings-section">
            <div class="settings-section-title">Badude Server</div>
            <div class="form-row">
                <div class="form-group"><label>Server Address</label><input type="text" id="settServer" placeholder="1.2.3.4"></div>
                <div class="form-group narrow"><label>Port</label><input type="number" id="settPort" placeholder="5553"></div>
            </div>
            <div class="form-group"><label>Domain</label><input type="text" id="settDomain" placeholder="tunnel.example.com"></div>
            <div class="form-group"><label>Shared Secret</label><input type="password" id="settSecret" placeholder="Leave empty to keep current"></div>
        </div>
        <div class="settings-section">
            <div class="settings-section-title">DNS Resolver</div>
            <div class="form-row">
                <div class="form-group"><label>Resolver Address</label><input type="text" id="settDnsResolver" placeholder="Leave empty for direct connection"></div>
                <div class="form-group narrow"><label>Port</label><input type="number" id="settDnsResolverPort" placeholder="53"></div>
            </div>
            <div class="form-hint">Route queries through a DNS resolver (e.g. 8.8.8.8). If set, server address is not needed.</div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-test" id="btnTest">Test Connection</button>
            <div class="modal-actions-right">
                <button class="btn btn-secondary" id="btnCancel">Cancel</button>
                <button class="btn btn-primary" id="btnSave">Save</button>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    var SVG_EYE = '<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>';
    var AVATAR_COLORS = ['#e17076','#7bc862','#e5ca77','#65aadd','#a695e7','#ee7aae','#6ec9cb','#faa774'];

    // ---- DOM refs ----
    var $ = function(id) { return document.getElementById(id); };
    var channelList = $('channelList');
    var msgArea = $('msgArea');
    var mainHeader = $('mainHeader');
    var statusBar = $('statusBar');

    // ---- State ----
    var activeChannel = null;
    var channelMessages = {};
    var channelData = {};
    var loadingChannel = null;
    var canLoadMore = {};

    // ---- Helpers ----
    function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function avatarColor(name) { var h = 0; for (var i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0; return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length]; }
    function fmtDate(s) {
        if (!s) return '';
        try {
            var d = new Date(s), now = new Date();
            var diff = now - d;
            if (diff < 60000) return 'just now';
            if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
            if (diff < 86400000) return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            if (diff < 172800000) return 'Yesterday ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            return d.toLocaleDateString([], {month:'short', day:'numeric'}) + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        } catch(e) { return s; }
    }
    function dateGroup(s) {
        if (!s) return '';
        try {
            var d = new Date(s), now = new Date();
            if (d.toDateString() === now.toDateString()) return 'Today';
            var y = new Date(now); y.setDate(y.getDate()-1);
            if (d.toDateString() === y.toDateString()) return 'Yesterday';
            return d.toLocaleDateString([], {month:'long', day:'numeric', year:'numeric'});
        } catch(e) { return ''; }
    }
    function status(msg, cls) { statusBar.textContent = msg; statusBar.className = 'status-bar' + (cls ? ' ' + cls : ''); }
    function connStatus(ok, txt) {
        $('connDot').className = 'conn-dot ' + (ok === true ? 'ok' : ok === false ? 'err' : 'off');
        $('connText').textContent = txt;
    }

    // ---- API ----
    function api(path, opts) { return fetch(path, opts).then(function(r) { return r.json(); }); }

    // ---- Channels ----
    function refreshChannels() {
        status('Loading channels...');
        api('/api/channels').then(function(data) {
            if (data.error) { status(data.error, 'error'); return; }
            var chs = data.channels || [];
            chs.forEach(function(ch) { channelData[ch.name] = ch; });
            renderChannelList(chs);
            status('Connected', 'ok');
        }).catch(function(e) { status('Error: ' + e.message, 'error'); });
    }

    function renderChannelList(channels) {
        channelList.innerHTML = '';
        if (!channels.length) {
            channelList.innerHTML = '<div class="empty-state">No channels loaded.<br>Configure settings and click refresh.</div>';
            return;
        }
        channels.forEach(function(ch) {
            var el = document.createElement('div');
            el.className = 'channel-item' + (activeChannel === ch.name ? ' active' : '');
            var color = avatarColor(ch.name);
            var display = ch.display && ch.display !== ch.name ? '<div class="channel-display">' + esc(ch.display) + '</div>' : '';
            el.innerHTML = '<div class="channel-avatar" style="background:' + color + '">' + esc(ch.name[0]).toUpperCase() + '</div>'
                + '<div class="channel-info"><div class="channel-name">' + esc(ch.display || ch.name) + '</div>'
                + '<div class="channel-meta">@' + esc(ch.name) + ' &middot; ' + ch.count + ' msgs</div></div>';
            el.addEventListener('click', function() { openChannel(ch.name); });
            channelList.appendChild(el);
        });
    }

    // ---- Open channel ----
    function openChannel(name) {
        activeChannel = name;
        channelMessages[name] = channelMessages[name] || [];
        canLoadMore[name] = true;

        var ch = channelData[name] || {};
        var color = avatarColor(name);

        // Update header
        mainHeader.style.display = 'flex';
        $('headerAvatar').textContent = name[0].toUpperCase();
        $('headerAvatar').style.background = color;
        $('headerName').textContent = ch.display || name;
        $('headerDisplay').textContent = '@' + name;

        // Highlight active in sidebar
        channelList.querySelectorAll('.channel-item').forEach(function(el) {
            var n = el.querySelector('.channel-meta');
            el.classList.toggle('active', n && n.textContent.indexOf('@' + name) !== -1);
        });

        // Show cached messages immediately (if any), then fetch fresh
        renderMsgs(name);
        fetchChannelMessages(name);
    }

    // ---- Fetch messages ----
    function fetchChannelMessages(channel, before) {
        if (loadingChannel === channel) return;
        loadingChannel = channel;

        var url = '/api/messages?channel=' + encodeURIComponent(channel) + '&limit=10';
        if (before) url += '&before=' + before;

        status('Loading ' + channel + '...');
        api(url).then(function(data) {
            loadingChannel = null;
            if (activeChannel !== channel) return;

            if (data.error) { status(data.error, 'error'); return; }

            var msgs = data.messages || [];
            if (msgs.length === 0) {
                canLoadMore[channel] = false;
            }

            var existing = channelMessages[channel] || [];
            var existingIds = {};
            existing.forEach(function(m) { existingIds[m.id] = true; });
            var newMsgs = msgs.filter(function(m) { return !existingIds[m.id]; });

            if (before) {
                channelMessages[channel] = existing.concat(newMsgs);
            } else {
                if (existing.length === 0) {
                    channelMessages[channel] = msgs;
                } else {
                    channelMessages[channel] = existing.concat(newMsgs);
                }
            }

            renderMsgs(channel, !before);
            status(channel + ': ' + channelMessages[channel].length + ' messages', 'ok');
        }).catch(function(e) {
            loadingChannel = null;
            if (activeChannel !== channel) return;
            status('Error: ' + e.message, 'error');
        });
    }

    // ---- Render messages ----
    function renderMsgs(channel, scrollBottom) {
        if (activeChannel !== channel) return;
        var msgs = channelMessages[channel] || [];
        var ch = channelData[channel] || {};
        var authorName = ch.display || channel;
        msgArea.innerHTML = '';

        if (canLoadMore[channel]) {
            var hint = document.createElement('div');
            hint.className = 'msg-loading';
            hint.textContent = msgs.length ? 'Scroll up for older messages' : 'Loading...';
            msgArea.appendChild(hint);
        }

        var sorted = msgs.slice().sort(function(a, b) { return a.id - b.id; });
        var lastDateGroup = '';

        sorted.forEach(function(msg) {
            // Date dividers
            var dg = dateGroup(msg.date);
            if (dg && dg !== lastDateGroup) {
                lastDateGroup = dg;
                var divider = document.createElement('div');
                divider.className = 'msg-divider';
                divider.innerHTML = '<span>' + esc(dg) + '</span>';
                msgArea.appendChild(divider);
            }

            var el = document.createElement('div');
            el.className = 'msg-bubble';

            var content = '';
            // Author
            var author = msg.author || authorName;
            content += '<div class="msg-author">' + esc(author) + '</div>';

            // Message body: use HTML if available, else escaped text
            if (msg.html) {
                content += '<div class="msg-text">' + msg.html + '</div>';
            } else {
                content += '<div class="msg-text">' + esc(msg.text) + '</div>';
            }

            // Footer
            content += '<div class="msg-footer">';
            if (msg.views) {
                content += '<span class="msg-views">' + SVG_EYE + ' ' + esc(msg.views) + '</span>';
            }
            content += '<span class="msg-date">' + fmtDate(msg.date) + '</span>';
            content += '</div>';

            el.innerHTML = content;
            msgArea.appendChild(el);
        });

        if (scrollBottom && sorted.length) {
            msgArea.scrollTop = msgArea.scrollHeight;
        }
    }

    // ---- Infinite scroll ----
    msgArea.addEventListener('scroll', function() {
        if (!activeChannel || !canLoadMore[activeChannel]) return;
        if (loadingChannel) return;
        var msgs = channelMessages[activeChannel] || [];
        if (msgs.length === 0) return;
        if (this.scrollTop < 50) {
            var oldest = Math.min.apply(null, msgs.map(function(m) { return m.id; }));
            var prevH = this.scrollHeight;
            fetchChannelMessages(activeChannel, oldest);
            var self = this;
            requestAnimationFrame(function() { self.scrollTop = self.scrollHeight - prevH; });
        }
    });

    // ---- Settings ----
    function openSettings() {
        api('/api/settings').then(function(data) {
            if (data.configured) {
                $('settServer').value = data.server || '';
                $('settPort').value = data.port || 5553;
                $('settDomain').value = data.domain || '';
                $('settDnsResolver').value = data.dns_resolver || '';
                $('settDnsResolverPort').value = data.dns_resolver_port || 53;
                $('settSecret').value = '';
                connStatus(true, 'Connected to ' + (data.dns_resolver || data.server) + ':' + (data.dns_resolver ? (data.dns_resolver_port || 53) : data.port));
            } else {
                connStatus(null, 'Not configured');
            }
        }).catch(function() { connStatus(false, 'Cannot reach local server'); });
        $('settingsModal').classList.add('open');
    }

    function closeSettings() { $('settingsModal').classList.remove('open'); }

    function getFormSettings() {
        return {
            server: $('settServer').value.trim(),
            port: parseInt($('settPort').value) || 5553,
            domain: $('settDomain').value.trim(),
            secret: $('settSecret').value,
            dns_resolver: $('settDnsResolver').value.trim(),
            dns_resolver_port: parseInt($('settDnsResolverPort').value) || 53,
        };
    }

    function saveSettings() {
        var s = getFormSettings();
        if (!s.domain) { connStatus(false, 'Domain is required'); return; }
        if (!s.server && !s.dns_resolver) { connStatus(false, 'Server address or DNS resolver required'); return; }
        connStatus(null, 'Saving...');
        api('/api/settings', {
            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(s),
        }).then(function(data) {
            if (data.ok) {
                connStatus(true, 'Settings saved');
                status('Settings saved', 'ok');
                closeSettings();
                channelMessages = {};
                channelData = {};
                canLoadMore = {};
                activeChannel = null;
                mainHeader.style.display = 'none';
                msgArea.innerHTML = '<div class="empty-state">Select a channel to view messages</div>';
                refreshChannels();
            } else {
                connStatus(false, data.error || 'Failed to save');
            }
        }).catch(function(e) { connStatus(false, 'Error: ' + e.message); });
    }

    function testConnection() {
        var s = getFormSettings();
        if (!s.domain) { connStatus(false, 'Domain is required'); return; }
        if (!s.server && !s.dns_resolver) { connStatus(false, 'Server address or DNS resolver required'); return; }
        connStatus(null, 'Testing...');
        api('/api/settings', {
            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(s),
        }).then(function(data) {
            if (!data.ok) { connStatus(false, 'Failed to apply settings'); return; }
            return api('/api/ping');
        }).then(function(data) {
            if (!data) return;
            if (data.error) { connStatus(false, 'Failed: ' + data.error); }
            else if (data.p === 'ok') { connStatus(true, 'Connected to server'); }
            else { connStatus(false, 'Unexpected response'); }
        }).catch(function(e) { connStatus(false, 'Error: ' + e.message); });
    }

    // ---- Event listeners ----
    $('btnRefresh').addEventListener('click', refreshChannels);
    $('btnSettings').addEventListener('click', openSettings);
    $('btnTest').addEventListener('click', testConnection);
    $('btnSave').addEventListener('click', saveSettings);
    $('btnCancel').addEventListener('click', closeSettings);

    // ---- Init ----
    api('/api/settings').then(function(data) {
        if (data.configured) { status('Connected', 'ok'); refreshChannels(); }
        else { status('Not configured - click settings', 'error'); }
    }).catch(function() { status('Cannot reach server', 'error'); });
})();
</script>
</body>
</html>
