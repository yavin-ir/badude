<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badude - Telegram Channel Reader</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0e1621; color: #f5f5f5; height: 100vh; overflow: hidden;
}
.app { display: flex; height: 100vh; }

.sidebar {
    width: 320px; background: #17212b; border-right: 1px solid #0e1621;
    display: flex; flex-direction: column; flex-shrink: 0;
}
.sidebar-header {
    padding: 12px 16px; display: flex; align-items: center;
    justify-content: space-between; border-bottom: 1px solid #0e1621;
}
.sidebar-header h2 { font-size: 16px; font-weight: 600; }
.btn-icon {
    background: none; border: none; color: #8b9bab; cursor: pointer;
    padding: 6px; border-radius: 4px; font-size: 18px; line-height: 1;
}
.btn-icon:hover { background: #232e3c; color: #f5f5f5; }
.channel-list { flex: 1; overflow-y: auto; }
.channel-item {
    padding: 12px 16px; cursor: pointer; display: flex;
    align-items: center; gap: 12px; transition: background 0.15s;
}
.channel-item:hover { background: #232e3c; }
.channel-item.active { background: #2b5278; }
.channel-avatar {
    width: 42px; height: 42px; border-radius: 50%; background: #2b5278;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 600; flex-shrink: 0;
}
.channel-info { flex: 1; min-width: 0; }
.channel-name {
    font-size: 14px; font-weight: 500; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
}
.channel-meta { font-size: 12px; color: #8b9bab; margin-top: 2px; }
.empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; color: #8b9bab;
    text-align: center; padding: 24px; font-size: 14px;
}

.main { flex: 1; display: flex; flex-direction: column; background: #0e1621; }
.main-header {
    padding: 12px 20px; background: #17212b; border-bottom: 1px solid #0e1621;
    display: none; align-items: center; gap: 12px;
}
.main-header .channel-name { font-size: 16px; }
.messages-area { flex: 1; overflow-y: auto; padding: 12px 20px; display: flex; flex-direction: column; }
.msg-loading { text-align: center; padding: 12px; color: #8b9bab; font-size: 13px; }
.msg-bubble {
    background: #182533; border-radius: 12px; padding: 10px 14px;
    margin-bottom: 8px; max-width: 85%; word-wrap: break-word;
}
.msg-text { font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
.msg-footer { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-top: 4px; }
.msg-views, .msg-date { font-size: 11px; color: #8b9bab; }
.status-bar {
    padding: 4px 16px; font-size: 12px; color: #8b9bab;
    background: #17212b; border-top: 1px solid #0e1621; text-align: center;
}
.status-bar.error { color: #e57373; }
.status-bar.ok { color: #81c784; }

.modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
    background: #17212b; border-radius: 12px; padding: 24px;
    width: 480px; max-width: 90vw; max-height: 90vh; overflow-y: auto;
}
.modal h3 { font-size: 18px; margin-bottom: 16px; }
.settings-section { margin-bottom: 20px; }
.settings-section-title {
    font-size: 13px; font-weight: 600; color: #6ab3f3; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid #232e3c;
}
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 13px; color: #8b9bab; margin-bottom: 4px; }
.form-group input {
    width: 100%; padding: 10px 12px; background: #0e1621; border: 1px solid #2b5278;
    border-radius: 8px; color: #f5f5f5; font-size: 14px; outline: none;
}
.form-group input:focus { border-color: #6ab3f3; }
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }
.form-row .form-group.narrow { flex: 0 0 110px; }
.form-hint { font-size: 11px; color: #6b7b8b; margin-top: 4px; }
.conn-status {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    background: #0e1621; border-radius: 8px; margin-bottom: 16px; font-size: 13px;
}
.conn-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.conn-dot.ok { background: #81c784; }
.conn-dot.err { background: #e57373; }
.conn-dot.off { background: #6b7b8b; }
.modal-actions { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-top: 20px; }
.modal-actions-right { display: flex; gap: 10px; }
.btn {
    padding: 8px 20px; border: none; border-radius: 8px;
    font-size: 14px; cursor: pointer; font-weight: 500;
}
.btn-primary { background: #2b5278; color: #f5f5f5; }
.btn-primary:hover { background: #3a6a99; }
.btn-secondary { background: #232e3c; color: #8b9bab; }
.btn-secondary:hover { background: #2d3a4a; color: #f5f5f5; }
.btn-test { background: #1a3a2a; color: #81c784; }
.btn-test:hover { background: #234a34; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2b5278; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a6a99; }
</style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Badude</h2>
            <div>
                <button class="btn-icon" id="btnRefresh" title="Refresh">&#x21bb;</button>
                <button class="btn-icon" id="btnSettings" title="Settings">&#x2699;</button>
            </div>
        </div>
        <div class="channel-list" id="channelList">
            <div class="empty-state">No channels loaded.<br>Configure settings and click refresh.</div>
        </div>
    </div>
    <div class="main">
        <div class="main-header" id="mainHeader">
            <div class="channel-avatar" id="headerAvatar"></div>
            <div class="channel-name" id="headerName"></div>
        </div>
        <div class="messages-area" id="msgArea">
            <div class="empty-state">Select a channel to view messages</div>
        </div>
        <div class="status-bar" id="statusBar">Not connected</div>
    </div>
</div>

<div class="modal-overlay" id="settingsModal">
    <div class="modal">
        <h3>Settings</h3>
        <div class="conn-status"><span class="conn-dot off" id="connDot"></span><span id="connText">Not configured</span></div>
        <div class="settings-section">
            <div class="settings-section-title">Badude Server</div>
            <div class="form-row">
                <div class="form-group"><label>Server Address</label><input type="text" id="settServer" placeholder="1.2.3.4"></div>
                <div class="form-group narrow"><label>Port</label><input type="number" id="settPort" placeholder="5553"></div>
            </div>
            <div class="form-group"><label>Domain</label><input type="text" id="settDomain" placeholder="tunnel.example.com"></div>
            <div class="form-group"><label>Shared Secret</label><input type="password" id="settSecret" placeholder="Leave empty to keep current"></div>
        </div>
        <div class="settings-section">
            <div class="settings-section-title">DNS Resolver</div>
            <div class="form-row">
                <div class="form-group"><label>Resolver Address</label><input type="text" id="settDnsResolver" placeholder="Leave empty for direct connection"></div>
                <div class="form-group narrow"><label>Port</label><input type="number" id="settDnsResolverPort" placeholder="53"></div>
            </div>
            <div class="form-hint">Route queries through a DNS resolver (e.g. 8.8.8.8). If set, server address is not needed.</div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-test" id="btnTest">Test Connection</button>
            <div class="modal-actions-right">
                <button class="btn btn-secondary" id="btnCancel">Cancel</button>
                <button class="btn btn-primary" id="btnSave">Save</button>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    // ---- DOM refs ----
    const $ = id => document.getElementById(id);
    const channelList = $('channelList');
    const msgArea = $('msgArea');
    const mainHeader = $('mainHeader');
    const statusBar = $('statusBar');

    // ---- State ----
    let activeChannel = null;
    let channelMessages = {}; // channel -> message array
    let loadingChannel = null;
    let canLoadMore = {};

    // ---- Helpers ----
    function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function fmtDate(s) { if (!s) return ''; try { return new Date(s).toLocaleString(); } catch { return s; } }
    function status(msg, cls) { statusBar.textContent = msg; statusBar.className = 'status-bar' + (cls ? ' ' + cls : ''); }
    function connStatus(ok, txt) {
        $('connDot').className = 'conn-dot ' + (ok === true ? 'ok' : ok === false ? 'err' : 'off');
        $('connText').textContent = txt;
    }

    // ---- API ----
    function api(path, opts) { return fetch(path, opts).then(r => r.json()); }

    // ---- Channels ----
    function refreshChannels() {
        status('Loading channels...');
        api('/api/channels').then(data => {
            if (data.error) { status(data.error, 'error'); return; }
            renderChannelList(data.channels || []);
            status('Connected', 'ok');
        }).catch(e => status('Error: ' + e.message, 'error'));
    }

    function renderChannelList(channels) {
        channelList.innerHTML = '';
        if (!channels.length) {
            channelList.innerHTML = '<div class="empty-state">No channels loaded.<br>Configure settings and click refresh.</div>';
            return;
        }
        channels.forEach(ch => {
            const el = document.createElement('div');
            el.className = 'channel-item' + (activeChannel === ch.name ? ' active' : '');
            el.innerHTML = '<div class="channel-avatar">' + esc(ch.name[0]).toUpperCase() + '</div>'
                + '<div class="channel-info"><div class="channel-name">' + esc(ch.name) + '</div>'
                + '<div class="channel-meta">' + ch.count + ' messages</div></div>';
            el.addEventListener('click', function() { openChannel(ch.name); });
            channelList.appendChild(el);
        });
    }

    // ---- Open channel ----
    function openChannel(name) {
        activeChannel = name;
        channelMessages[name] = channelMessages[name] || [];
        canLoadMore[name] = true;

        // Update header
        mainHeader.style.display = 'flex';
        $('headerAvatar').textContent = name[0].toUpperCase();
        $('headerName').textContent = name;

        // Highlight active in sidebar
        channelList.querySelectorAll('.channel-item').forEach((el, i) => {
            const n = el.querySelector('.channel-name');
            el.classList.toggle('active', n && n.textContent === name);
        });

        // Show cached messages immediately (if any), then fetch fresh
        renderMsgs(name);
        fetchChannelMessages(name);
    }

    // ---- Fetch messages ----
    function fetchChannelMessages(channel, before) {
        if (loadingChannel === channel) return; // already loading this channel
        loadingChannel = channel;

        let url = '/api/messages?channel=' + encodeURIComponent(channel) + '&limit=20';
        if (before) url += '&before=' + before;

        status('Loading ' + channel + '...');
        api(url).then(data => {
            loadingChannel = null;
            if (activeChannel !== channel) return; // user switched away

            if (data.error) { status(data.error, 'error'); return; }

            const msgs = data.messages || [];
            if (msgs.length === 0) {
                canLoadMore[channel] = false;
            }

            // Merge into channel store
            const existing = channelMessages[channel] || [];
            const existingIds = new Set(existing.map(m => m.id));
            const newMsgs = msgs.filter(m => !existingIds.has(m.id));

            if (before) {
                channelMessages[channel] = existing.concat(newMsgs);
            } else {
                // Fresh load: if we had no messages, just use server response
                // If we had cached ones, merge
                if (existing.length === 0) {
                    channelMessages[channel] = msgs;
                } else {
                    channelMessages[channel] = existing.concat(newMsgs);
                }
            }

            renderMsgs(channel, !before);
            status(channel + ': ' + channelMessages[channel].length + ' messages', 'ok');
        }).catch(e => {
            loadingChannel = null;
            if (activeChannel !== channel) return;
            status('Error: ' + e.message, 'error');
        });
    }

    // ---- Render messages ----
    function renderMsgs(channel, scrollBottom) {
        if (activeChannel !== channel) return;
        const msgs = channelMessages[channel] || [];
        msgArea.innerHTML = '';

        if (canLoadMore[channel]) {
            const hint = document.createElement('div');
            hint.className = 'msg-loading';
            hint.textContent = msgs.length ? 'Scroll up for older messages' : 'Loading...';
            msgArea.appendChild(hint);
        }

        const sorted = msgs.slice().sort((a, b) => a.id - b.id);
        sorted.forEach(msg => {
            const el = document.createElement('div');
            el.className = 'msg-bubble';
            el.innerHTML = '<div class="msg-text">' + esc(msg.text) + '</div>'
                + '<div class="msg-footer">'
                + (msg.views ? '<span class="msg-views">' + esc(msg.views) + ' views</span>' : '')
                + '<span class="msg-date">' + fmtDate(msg.date) + '</span></div>';
            msgArea.appendChild(el);
        });

        if (scrollBottom && sorted.length) {
            msgArea.scrollTop = msgArea.scrollHeight;
        }
    }

    // ---- Infinite scroll ----
    msgArea.addEventListener('scroll', function() {
        if (!activeChannel || !canLoadMore[activeChannel]) return;
        if (loadingChannel) return;
        const msgs = channelMessages[activeChannel] || [];
        if (msgs.length === 0) return;
        if (this.scrollTop < 50) {
            const oldest = Math.min(...msgs.map(m => m.id));
            const prevH = this.scrollHeight;
            fetchChannelMessages(activeChannel, oldest);
            // Restore scroll after render
            requestAnimationFrame(() => { this.scrollTop = this.scrollHeight - prevH; });
        }
    });

    // ---- Settings ----
    function openSettings() {
        api('/api/settings').then(data => {
            if (data.configured) {
                $('settServer').value = data.server || '';
                $('settPort').value = data.port || 5553;
                $('settDomain').value = data.domain || '';
                $('settDnsResolver').value = data.dns_resolver || '';
                $('settDnsResolverPort').value = data.dns_resolver_port || 53;
                $('settSecret').value = '';
                connStatus(true, 'Connected to ' + (data.dns_resolver || data.server) + ':' + (data.dns_resolver ? (data.dns_resolver_port || 53) : data.port));
            } else {
                connStatus(null, 'Not configured');
            }
        }).catch(() => connStatus(false, 'Cannot reach local server'));
        $('settingsModal').classList.add('open');
    }

    function closeSettings() { $('settingsModal').classList.remove('open'); }

    function getFormSettings() {
        return {
            server: $('settServer').value.trim(),
            port: parseInt($('settPort').value) || 5553,
            domain: $('settDomain').value.trim(),
            secret: $('settSecret').value,
            dns_resolver: $('settDnsResolver').value.trim(),
            dns_resolver_port: parseInt($('settDnsResolverPort').value) || 53,
        };
    }

    function saveSettings() {
        const s = getFormSettings();
        if (!s.domain) { connStatus(false, 'Domain is required'); return; }
        if (!s.server && !s.dns_resolver) { connStatus(false, 'Server address or DNS resolver required'); return; }
        connStatus(null, 'Saving...');
        api('/api/settings', {
            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(s),
        }).then(data => {
            if (data.ok) {
                connStatus(true, 'Settings saved');
                status('Settings saved', 'ok');
                closeSettings();
                // Clear cached messages since server/key may have changed
                channelMessages = {};
                canLoadMore = {};
                activeChannel = null;
                mainHeader.style.display = 'none';
                msgArea.innerHTML = '<div class="empty-state">Select a channel to view messages</div>';
                refreshChannels();
            } else {
                connStatus(false, data.error || 'Failed to save');
            }
        }).catch(e => connStatus(false, 'Error: ' + e.message));
    }

    function testConnection() {
        const s = getFormSettings();
        if (!s.domain) { connStatus(false, 'Domain is required'); return; }
        if (!s.server && !s.dns_resolver) { connStatus(false, 'Server address or DNS resolver required'); return; }
        connStatus(null, 'Testing...');
        api('/api/settings', {
            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(s),
        }).then(data => {
            if (!data.ok) { connStatus(false, 'Failed to apply settings'); return; }
            return api('/api/ping');
        }).then(data => {
            if (!data) return;
            if (data.error) { connStatus(false, 'Failed: ' + data.error); }
            else if (data.p === 'ok') { connStatus(true, 'Connected to server'); }
            else { connStatus(false, 'Unexpected response'); }
        }).catch(e => connStatus(false, 'Error: ' + e.message));
    }

    // ---- Event listeners ----
    $('btnRefresh').addEventListener('click', refreshChannels);
    $('btnSettings').addEventListener('click', openSettings);
    $('btnTest').addEventListener('click', testConnection);
    $('btnSave').addEventListener('click', saveSettings);
    $('btnCancel').addEventListener('click', closeSettings);

    // ---- Init ----
    api('/api/settings').then(data => {
        if (data.configured) { status('Connected', 'ok'); refreshChannels(); }
        else { status('Not configured - click settings', 'error'); }
    }).catch(() => status('Cannot reach server', 'error'));
})();
</script>
</body>
</html>
